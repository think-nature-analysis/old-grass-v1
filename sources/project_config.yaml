# Project Configuration File
# プロジェクト設定ファイル
# YAML形式で記述してください

# プロジェクトID（現在未使用）
project_id: 1

# 機能フラグとグローバル設定
features:
  # ラスターレイヤー機能
  rasterLayers:
    enabled: true
    layerSelectionPanel: true
    layerSettingsUI: true
    initmap: true

  # ベクターレイヤー機能
  vectorLayers:
    enabled: true
    layerPanel: true
    propertySelection: true
    loadGeojson: true

  # マーカー機能
  markers:
    csvImport: true

  # 地図コントロール
  mapControls:
    homeButton: true

  # 位置コードシステム
  locationCodes:
    type: "meshCode"

  # 詳細パネル表示設定
  detailPanel:
    displayMode: "iframe"
    urltype: "raw"
    urlbase: null
    basedir: "../img/"
    baseUrl: "../html/"
    idBasedir: "../my_assets/"
    idBaseUrl: "../my_assets/"
    fallbackImage: "../default_img/noimage1.png"
    timeoutImage: "../default_img/timeout_image.png"

  # 地図初期設定
  initmap:
    center: [35.139314945383745, 136.9018999211331]
    zoom: 5
    bounds:
      - [-90, -280]
      - [90, 280]
    maxBoundsViscosity: 0.5
